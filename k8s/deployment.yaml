apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      containers:
      - name: web-app
        # ENTER YOUR EXACT COPIED STRING HERE WITHOUT ALTERATIONS:
        image: <YOUR_ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/secure-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080