name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
jobs:
  security-scanning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      # GATE 1: Secret Scanning
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
      # GATE 2: Scan Terraform for misconfigurations before deployment
      - name: tfsec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: ./infrastructure
          # ADDED BELOW TO PREVENT MISCONFIGURATIONS FROM BLOCKING LAB DEPLOYMENTS
          soft_fail: true
      # GATE 3: Scan the Docker image for Vulnerabilities
      - name: Build Image
        run: docker build -t my-app:latest ./src
      
      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app:latest'
          format: 'table'
          exit-code: '0' # CHANGE FROM '1' TO '0' TO LET LAB PIPELINE COMPLETION PASS
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          